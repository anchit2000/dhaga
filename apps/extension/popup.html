<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      margin: 0; width: 340px; background: #0d0b09; color: #f3ede2;
      font: 13px/1.5 Georgia, "Times New Roman", serif; padding: 14px;
    }
    h1 { font-size: 16px; font-weight: 500; color: #e2a44c; margin: 0 0 10px; }
    textarea {
      width: 100%; box-sizing: border-box; min-height: 110px; resize: vertical;
      background: #16120e; color: #f3ede2; border: 1px solid #2b241b;
      border-radius: 8px; padding: 8px; font: 12px/1.5 ui-monospace, monospace;
    }
    textarea:focus { outline: none; border-color: #e2a44c66; }
    button {
      margin-top: 10px; width: 100%; padding: 9px 0; border: 0; cursor: pointer;
      border-radius: 999px; font-weight: 600; font-size: 13px; color: #0d0b09;
      background: linear-gradient(#f0bc6e, #d18f36);
    }
    button:disabled { opacity: 0.6; cursor: default; }
    #status { margin: 10px 0 0; font-size: 12px; color: #a49a8a; }
    #status a { color: #e2a44c; }
    #status.error { color: #f87171; }
  </style>
</head>
<body>
  <h1>Capture to Dhaga</h1>
  <textarea id="raw" placeholder="Select a person's details on the page before opening this popup — or paste them here."></textarea>
  <button id="save" type="button">Save to my network</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
